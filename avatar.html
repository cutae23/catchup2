<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>내 아바타 — Catch-up!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--acc:#ff3300;--acc2:#cc1a00;--acc3:#ffb3a0;--ink:#1a1624;--ink2:#4a4460;--ink3:#8a829e;--ink4:#c8c2d8;--ink5:#edeaf4;--warm:#f7f4ee;--card:#fff;--r:12px;--rp:999px}
body{font-family:'Nunito',sans-serif;background:var(--warm);min-height:100vh}

/* 헤더 */
.hdr{background:var(--ink);padding:12px 16px;display:flex;align-items:center;gap:12px}
.hdr-back{color:#fff;font-size:20px;text-decoration:none;display:flex;align-items:center}
.hdr-title{font-family:'Caveat',cursive;font-size:22px;font-weight:700;color:#fff;flex:1}
.hdr-save{padding:7px 18px;background:var(--acc);color:#fff;border:none;border-radius:var(--rp);font-size:13px;font-weight:800;cursor:pointer}

/* 레이아웃 */
.wrap{display:flex;flex-direction:column;gap:0;min-height:calc(100vh - 56px)}
.preview{background:linear-gradient(180deg,#e8eeff 0%,#c8d8ff 100%);display:flex;flex-direction:column;align-items:center;padding:16px 0 0;position:sticky;top:0;z-index:10}
.preview-btns{display:flex;gap:6px;padding:8px 0 10px}
.pbtn{padding:5px 14px;border:1.5px solid rgba(255,255,255,.5);border-radius:var(--rp);background:rgba(255,255,255,.2);color:var(--ink);font-size:11px;font-weight:700;cursor:pointer}
.pbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.editor{padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}

/* 섹션 */
.sec{background:var(--card);border-radius:var(--r);border:1.5px solid var(--ink5);overflow:hidden}
.sec-hd{padding:10px 14px;font-size:11px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;background:var(--warm);border-bottom:1.5px solid var(--ink5);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.sec-hd-arrow{font-size:12px;transition:transform .2s}
.sec-hd.open .sec-hd-arrow{transform:rotate(180deg)}
.sec-body{padding:12px 14px;display:none;flex-direction:column;gap:12px}
.sec-body.open{display:flex}

/* 옵션 그리드 */
.opt-row{display:flex;flex-direction:column;gap:6px}
.opt-label{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em}
.opt-grid{display:flex;gap:6px;flex-wrap:wrap}
.opt-btn{border:2px solid var(--ink5);border-radius:10px;background:var(--warm);cursor:pointer;padding:5px 10px;font-size:12px;font-weight:700;color:var(--ink2);transition:all .15s;white-space:nowrap}
.opt-btn.on{border-color:var(--acc);background:var(--acc3);color:var(--acc2)}
.opt-btn:hover{border-color:var(--ink3)}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .15s;flex-shrink:0}
.color-dot.on{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc3)}
.color-sq{width:28px;height:28px;border-radius:8px;cursor:pointer;border:3px solid transparent;transition:border-color .15s;flex-shrink:0}
.color-sq.on{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc3)}

/* 슬라이더 */
.slider-row{display:flex;align-items:center;gap:10px}
.slider-row input{flex:1;accent-color:var(--acc)}
.slider-val{font-size:13px;font-weight:800;color:var(--acc);min-width:36px;text-align:right}

/* 체형 카드 */
.body-pick{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.bp{border:2px solid var(--ink5);border-radius:10px;background:var(--warm);cursor:pointer;padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--ink3)}
.bp.on{border-color:var(--acc);background:var(--acc3);color:var(--acc2)}
</style>
</head>
<body>

<div class="hdr">
  <a href="index.html" class="hdr-back">←</a>
  <div class="hdr-title">내 아바타</div>
  <button class="hdr-save" onclick="saveAndBack()">저장 →</button>
</div>

<div class="wrap">
  <!-- 미리보기 -->
  <div class="preview">
    <canvas id="av-canvas" width="200" height="340" style="max-height:260px"></canvas>
    <div class="preview-btns">
      <button class="pbtn on" onclick="setView('front',this)">정면</button>
      <button class="pbtn" onclick="setView('side',this)">측면</button>
      <button class="pbtn" onclick="setView('back',this)">후면</button>
    </div>
  </div>

  <!-- 편집 패널 -->
  <div class="editor" id="editor">

    <!-- 기본 설정 -->
    <div class="sec">
      <div class="sec-hd open" onclick="toggleSec(this)">기본 설정 <span class="sec-hd-arrow">▼</span></div>
      <div class="sec-body open">
        <div class="opt-row">
          <div class="opt-label">성별</div>
          <div class="opt-grid">
            <button class="opt-btn" data-k="gender" data-v="female" onclick="pick(this)">👩 여성</button>
            <button class="opt-btn" data-k="gender" data-v="male" onclick="pick(this)">👨 남성</button>
            <button class="opt-btn" data-k="gender" data-v="neutral" onclick="pick(this)">🧑 중성</button>
          </div>
        </div>
        <div class="opt-row">
          <div class="opt-label">키 <span id="lbl-height"></span></div>
          <div class="slider-row">
            <input type="range" min="140" max="200" step="1" id="sl-height" oninput="sliderChange('height',this.value)">
            <div class="slider-val" id="val-height">165cm</div>
          </div>
        </div>
        <div class="opt-row">
          <div class="opt-label">나이대</div>
          <div class="opt-grid">
            <button class="opt-btn" data-k="age" data-v="teen" onclick="pick(this)">10대</button>
            <button class="opt-btn" data-k="age" data-v="20s" onclick="pick(this)">20대</button>
            <button class="opt-btn" data-k="age" data-v="30s" onclick="pick(this)">30대</button>
            <button class="opt-btn" data-k="age" data-v="40s" onclick="pick(this)">40대</button>
            <button class="opt-btn" data-k="age" data-v="50s" onclick="pick(this)">50대+</button>
          </div>
        </div>
        <div class="opt-row">
          <div class="opt-label">체형</div>
          <div class="body-pick">
            <button class="bp" data-k="bodytype" data-v="slim" onclick="pick(this)">🪶<br>슬림</button>
            <button class="bp" data-k="bodytype" data-v="normal" onclick="pick(this)">🧍<br>보통</button>
            <button class="bp" data-k="bodytype" data-v="chubby" onclick="pick(this)">🐻<br>통통</button>
            <button class="bp" data-k="bodytype" data-v="muscular" onclick="pick(this)">💪<br>근육</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 피부 -->

      <div class="sec-hd" onclick="toggleSec(this)">피부 <span class="sec-hd-arrow">▼</span></div>
      <div class="sec-body">
        <div class="opt-row">
          <div class="opt-label">피부색</div>
          <div class="opt-grid" id="skin-colors"></div>
        </div>
        <div class="opt-row">
          <div class="opt-label">볼 터치</div>
          <div class="opt-grid">
            <button class="opt-btn" data-k="blush" data-v="none" onclick="pick(this)">없음</button>
            <button class="opt-btn" data-k="blush" data-v="soft" onclick="pick(this)">은은하게</button>
            <button class="opt-btn" data-k="blush" data-v="rosy" onclick="pick(this)">발그레</button>
            <button class="opt-btn" data-k="blush" data-v="freckles" onclick="pick(this)">주근깨</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 얼굴형 -->
    <div class="sec">
      <div class="sec-hd" onclick="toggleSec(this)">얼굴형 <span class="sec-hd-arrow">▼</span></div>
      <div class="sec-body">
        <div class="opt-row">
          <div class="opt-label">얼굴형</div>
          <div class="opt-grid">
            <button class="opt-btn" data-k="faceShape" data-v="oval" onclick="pick(this)">🥚 계란형</button>
            <button class="opt-btn" data-k="faceShape" data-v="round" onclick="pick(this)">🔵 둥근형</button>
            <button class="opt-btn" data-k="faceShape" data-v="square" onclick="pick(this)">⬛ 각진형</button>

            <button class="opt-btn" data-k="faceShape" data-v="long" onclick="pick(this)">📏 긴형</button>

        </div>
        <div class="opt-row">
          <div class="opt-label">콧수염</div>
          <div class="opt-grid">
            <button class="opt-btn" data-k="mustache" data-v="none" onclick="pick(this)">없음</button>
            <button class="opt-btn" data-k="mustache" data-v="thin" onclick="pick(this)">얇은 수염</button>
            <button class="opt-btn" data-k="mustache" data-v="full" onclick="pick(this)">콧수염</button>
            <button class="opt-btn" data-k="mustache" data-v="beard" onclick="pick(this)">턱수염</button>
            <button class="opt-btn" data-k="mustache" data-v="full-beard" onclick="pick(this)">풀수염</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 머리카락 -->
    <div class="sec">
      <div class="sec-hd" onclick="toggleSec(this)">머리카락 <span class="sec-hd-arrow">▼</span></div>
      <div class="sec-body">
        <div class="opt-row">
          <div class="opt-label">헤어스타일</div>
          <div class="opt-grid">
            <button class="opt-btn" data-k="hair" data-v="short" onclick="pick(this)">숏컷</button>
            <button class="opt-btn" data-k="hair" data-v="medium" onclick="pick(this)">미디엄</button>
            <button class="opt-btn" data-k="hair" data-v="long" onclick="pick(this)">롱</button>
            <button class="opt-btn" data-k="hair" data-v="wavy" onclick="pick(this)">웨이브</button>
            <button class="opt-btn" data-k="hair" data-v="curly" onclick="pick(this)">곱슬</button>
            <button class="opt-btn" data-k="hair" data-v="updo" onclick="pick(this)">올림머리</button>
            <button class="opt-btn" data-k="hair" data-v="ponytail" onclick="pick(this)">포니테일</button>
            <button class="opt-btn" data-k="hair" data-v="bun" onclick="pick(this)">번머리</button>
            <button class="opt-btn" data-k="hair" data-v="buzzcut" onclick="pick(this)">삭발</button>
            <button class="opt-btn" data-k="hair" data-v="afro" onclick="pick(this)">아프로</button>
          </div>
        </div>
        <div class="opt-row">
          <div class="opt-label">머리 색</div>
          <div class="opt-grid" id="hair-colors"></div>
        </div>
      </div>
    </div>

    <!-- 눈썹 -->
    <div class="sec">
      <div class="sec-hd" onclick="toggleSec(this)">눈썹 <span class="sec-hd-arrow">▼</span></div>
      <div class="sec-body">
        <div class="opt-row">
          <div class="opt-label">눈썹 모양</div>
          <div class="opt-grid">
            <button class="opt-btn" data-k="brow" data-v="natural" onclick="pick(this)">자연스러운</button>
            <button class="opt-btn" data-k="brow" data-v="thick" onclick="pick(this)">짙은</button>
            <button class="opt-btn" data-k="brow" data-v="thin" onclick="pick(this)">가는</button>
            <button class="opt-btn" data-k="brow" data-v="arched" onclick="pick(this)">아치형</button>
            <button class="opt-btn" data-k="brow" data-v="straight" onclick="pick(this)">일자형</button>
            <button class="opt-btn" data-k="brow" data-v="angry" onclick="pick(this)">찡그린</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 눈 -->
    <div class="sec">
      <div class="sec-hd" onclick="toggleSec(this)">눈 <span class="sec-hd-arrow">▼</span></div>
      <div class="sec-body">
        <div class="opt-row">
          <div class="opt-label">눈 모양</div>
          <div class="opt-grid">
            <button class="opt-btn" data-k="eye" data-v="round" onclick="pick(this)">동그란</button>
            <button class="opt-btn" data-k="eye" data-v="almond" onclick="pick(this)">아몬드형</button>
            <button class="opt-btn" data-k="eye" data-v="narrow" onclick="pick(this)">가는</button>
            <button class="opt-btn" data-k="eye" data-v="droopy" onclick="pick(this)">처진</button>
            <button class="opt-btn" data-k="eye" data-v="wide" onclick="pick(this)">큰눈</button>
            <button class="opt-btn" data-k="eye" data-v="monolid" onclick="pick(this)">외꺼풀</button>
          </div>
        </div>
        <div class="opt-row">
          <div class="opt-label">눈 색</div>
          <div class="opt-grid" id="eye-colors"></div>
        </div>
        <div class="opt-row">
          <div class="opt-label">속눈썹</div>
          <div class="opt-grid">
            <button class="opt-btn" data-k="lash" data-v="none" onclick="pick(this)">없음</button>
            <button class="opt-btn" data-k="lash" data-v="natural" onclick="pick(this)">자연스러운</button>
            <button class="opt-btn" data-k="lash" data-v="dramatic" onclick="pick(this)">진한</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 코 -->
    <div class="sec">
      <div class="sec-hd" onclick="toggleSec(this)">코 <span class="sec-hd-arrow">▼</span></div>
      <div class="sec-body">
        <div class="opt-row">

          <div class="opt-grid">

            <button class="opt-btn" data-k="nose" data-v="roman" onclick="pick(this)">매부리</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 입술 -->
    <div class="sec">
      <div class="sec-hd" onclick="toggleSec(this)">입술 <span class="sec-hd-arrow">▼</span></div>
      <div class="sec-body">
        <div class="opt-row">
          <div class="opt-label">입술 모양</div>
          <div class="opt-grid">
            <button class="opt-btn" data-k="lips" data-v="smile" onclick="pick(this)">😊 미소</button>
            <button class="opt-btn" data-k="lips" data-v="grin" onclick="pick(this)">😁 활짝</button>
            <button class="opt-btn" data-k="lips" data-v="neutral" onclick="pick(this)">😐 무표정</button>
            <button class="opt-btn" data-k="lips" data-v="pout" onclick="pick(this)">😗 뾰로통</button>
            <button class="opt-btn" data-k="lips" data-v="open" onclick="pick(this)">😮 벌린</button>
            <button class="opt-btn" data-k="lips" data-v="smirk" onclick="pick(this)">😏 한쪽</button>
          </div>
        </div>
        <div class="opt-row">
          <div class="opt-label">입술 색</div>
          <div class="opt-grid" id="lip-colors"></div>
        </div>
      </div>
    </div>

    <!-- 윗옷 -->
    <div class="sec">
      <div class="sec-hd" onclick="toggleSec(this)">윗옷 <span class="sec-hd-arrow">▼</span></div>
      <div class="sec-body">
        <div class="opt-row">
          <div class="opt-label">스타일</div>
          <div class="opt-grid">
            <button class="opt-btn" data-k="top" data-v="tshirt" onclick="pick(this)">👕 티셔츠</button>

        </div>
      </div>
    </div>

    <!-- 아래옷 -->
    <div class="sec">
      <div class="sec-hd" onclick="toggleSec(this)">아래옷 <span class="sec-hd-arrow">▼</span></div>
      <div class="sec-body">
        <div class="opt-row">

            <button class="opt-btn" data-k="bottom" data-v="jeans" onclick="pick(this)">👖 청바지</button>

    <!-- 신발 -->

      <div class="sec-hd" onclick="toggleSec(this)">신발 <span class="sec-hd-arrow">▼</span></div>
      <div class="sec-body">
        <div class="opt-row">

    <!-- 액세서리 -->
    <div class="sec">
      <div class="sec-hd" onclick="toggleSec(this)">액세서리 <span class="sec-hd-arrow">▼</span></div>
      <div class="sec-body">
        <div class="opt-row">
          <div class="opt-label">안경/선글라스</div>
          <div class="opt-grid">
            <button class="opt-btn" data-k="glasses" data-v="none" onclick="pick(this)">없음</button>
            <button class="opt-btn" data-k="glasses" data-v="round" onclick="pick(this)">🔵 동그란 안경</button>
            <button class="opt-btn" data-k="glasses" data-v="square" onclick="pick(this)">⬛ 사각 안경</button>
            <button class="opt-btn" data-k="glasses" data-v="sunglasses" onclick="pick(this)">😎 선글라스</button>
            <button class="opt-btn" data-k="glasses" data-v="cat-eye" onclick="pick(this)">고양이 안경</button>
          </div>
        </div>
        <div class="opt-row">
          <div class="opt-label">모자</div>
          <div class="opt-grid">
            <button class="opt-btn" data-k="hat" data-v="none" onclick="pick(this)">없음</button>
            <button class="opt-btn" data-k="hat" data-v="cap" onclick="pick(this)">🧢 캡</button>
            <button class="opt-btn" data-k="hat" data-v="beanie" onclick="pick(this)">비니</button>
            <button class="opt-btn" data-k="hat" data-v="beret" onclick="pick(this)">🎩 베레모</button>
            <button class="opt-btn" data-k="hat" data-v="bucket" onclick="pick(this)">버킷햇</button>
            <button class="opt-btn" data-k="hat" data-v="cowboy" onclick="pick(this)">🤠 카우보이</button>
          </div>
        </div>
        <div class="opt-row">
          <div class="opt-label">귀걸이</div>
          <div class="opt-grid">
            <button class="opt-btn" data-k="earring" data-v="none" onclick="pick(this)">없음</button>
            <button class="opt-btn" data-k="earring" data-v="stud" onclick="pick(this)">스터드</button>
            <button class="opt-btn" data-k="earring" data-v="hoop" onclick="pick(this)">후프</button>
            <button class="opt-btn" data-k="earring" data-v="dangle" onclick="pick(this)">댕글</button>
          </div>
        </div>
        <div class="opt-row">
          <div class="opt-label">목걸이</div>
          <div class="opt-grid">
            <button class="opt-btn" data-k="necklace" data-v="none" onclick="pick(this)">없음</button>
            <button class="opt-btn" data-k="necklace" data-v="chain" onclick="pick(this)">체인</button>
            <button class="opt-btn" data-k="necklace" data-v="pendant" onclick="pick(this)">펜던트</button>
            <button class="opt-btn" data-k="necklace" data-v="choker" onclick="pick(this)">초커</button>
          </div>
        </div>
        <div class="opt-row">
          <div class="opt-label">가방</div>
          <div class="opt-grid">
            <button class="opt-btn" data-k="bag" data-v="none" onclick="pick(this)">없음</button>
            <button class="opt-btn" data-k="bag" data-v="backpack" onclick="pick(this)">🎒 백팩</button>
            <button class="opt-btn" data-k="bag" data-v="tote" onclick="pick(this)">토트백</button>
            <button class="opt-btn" data-k="bag" data-v="clutch" onclick="pick(this)">클러치</button>
            <button class="opt-btn" data-k="bag" data-v="crossbody" onclick="pick(this)">크로스백</button>
          </div>
        </div>
      </div>
    </div>

    <div style="height:20px"></div>
  </div>
</div>

<script>
// ── 색상 팔레트 ──
const SKINS=['#FFDBB4','#F5C99A','#EEB98A','#D4956A','#C68642','#A0694A','#8D5524','#6B3D2E'];
const HAIRS=['#1a1a1a','#2c1a0e','#4a3000','#7B3F00','#8B4513','#C0843C','#F4C96E','#FFD700','#ff4444','#ff69b4','#9B59B6','#00BFFF','#1abc9c','#ffffff','#808080'];
const EYES=['#1a1a1a','#3d2b1f','#704214','#1a5276','#1e8449','#7d3c98','#2980b9','#e67e22'];
const LIPS=['#c0605a','#e88080','#ff6b6b','#d4537e','#8B4513','#cd853f','#ff8c69','#ffb6c1'];
const CLOTHCOLORS=['#e85d3a','#ff8c00','#2ecc71','#3498db','#9b59b6','#1abc9c','#e74c3c','#34495e','#f39c12','#1a1624','#fff','#ecf0f1','#27ae60','#8e44ad','#d35400','#c0392b'];

// ── 기본 아바타 상태 ──
const DEFAULT_AV={
  gender:'female',height:165,age:'20s',bodytype:'normal',
  skin:0,blush:'soft',
  faceShape:'oval',mustache:'none',
  hair:'medium',hairColor:3,
  brow:'natural',
  eye:'round',eyeColor:0,lash:'natural',
  nose:'button',
  lips:'smile',lipColor:0,
  top:'tshirt',topColor:0,
  bottom:'jeans',bottomColor:9,
  shoes:'sneakers',shoesColor:0,
  glasses:'none',hat:'none',earring:'none',necklace:'none',bag:'none'
};
let av={...DEFAULT_AV};
try{const s=localStorage.getItem('catchup_avatar2');if(s)av={...DEFAULT_AV,...JSON.parse(s)};}catch(e){}

let view='front';

// ── 색상 팔레트 렌더 ──
function renderPalette(id,colors,key,colorKey){
  const el=document.getElementById(id);
  if(!el)return;
  el.innerHTML=colors.map((c,i)=>`<div class="color-dot${av[colorKey]===i?' on':''}" style="background:${c}" onclick="pickColor('${colorKey}',${i},this,'${id}')"></div>`).join('');
}

function pickColor(key,idx,el,gridId){
  av[key]=idx;
  document.querySelectorAll(`#${gridId} .color-dot`).forEach(d=>d.classList.remove('on'));
  el.classList.add('on');
  drawAvatar();
}

// ── 섹션 토글 ──
function toggleSec(hd){
  hd.classList.toggle('open');
  hd.nextElementSibling.classList.toggle('open');
}

// ── 옵션 선택 ──
function pick(btn){
  const k=btn.dataset.k, v=btn.dataset.v;
  av[k]=v;
  // 같은 data-k 버튼들 중 on 제거
  document.querySelectorAll(`[data-k="${k}"]`).forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  drawAvatar();
}

function sliderChange(key,val){
  av[key]=+val;
  document.getElementById('val-'+key).textContent=key==='height'?val+'cm':val;
  drawAvatar();
}

function setView(v,btn){
  view=v;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  drawAvatar();
}

// ── 초기 UI 상태 ──
function initUI(){
  // 색상 팔레트
  renderPalette('skin-colors',SKINS,'skin','skin');
  renderPalette('hair-colors',HAIRS,'hair','hairColor');
  renderPalette('eye-colors',EYES,'eye','eyeColor');
  renderPalette('lip-colors',LIPS,'lips','lipColor');
  renderPalette('top-colors',CLOTHCOLORS,'top','topColor');
  renderPalette('bottom-colors',CLOTHCOLORS,'bottom','bottomColor');
  renderPalette('shoes-colors',CLOTHCOLORS,'shoes','shoesColor');

  // 슬라이더
  document.getElementById('sl-height').value=av.height;
  document.getElementById('val-height').textContent=av.height+'cm';

  // 버튼 on 상태
  ['gender','age','bodytype','blush','faceShape','mustache','hair','brow','eye','lash','nose','lips','top','bottom','shoes','glasses','hat','earring','necklace','bag'].forEach(k=>{
    document.querySelectorAll(`[data-k="${k}"]`).forEach(b=>{
      b.classList.toggle('on', b.dataset.v===String(av[k]));
    });
  });
}

// ── Canvas 아바타 그리기 ──
const C=document.getElementById('av-canvas');
const ctx=C.getContext('2d');

function drawAvatar(){
  ctx.clearRect(0,0,C.width,C.height);
  const sk=SKINS[av.skin]||SKINS[0];
  const hr=HAIRS[av.hairColor]||'#1a1a1a';
  const ey=EYES[av.eyeColor]||'#1a1a1a';
  const lp=LIPS[av.lipColor]||'#c0605a';
  const tc=CLOTHCOLORS[av.topColor]||'#e85d3a';
  const bc=CLOTHCOLORS[av.bottomColor]||'#34495e';
  const sc=CLOTHCOLORS[av.shoesColor]||'#1a1a1a';

  // 체형에 따른 비율
  const bw={slim:52,normal:62,chubby:78,muscular:72}[av.bodytype]||62;
  const ht=av.height;
  const scale=ht/175;
  const isMale=av.gender==='male';

  ctx.save();
  ctx.translate(100,10);

  if(view==='front') drawFront(sk,hr,ey,lp,tc,bc,sc,bw,scale,isMale);
  else if(view==='side') drawSide(sk,hr,tc,bc,sc,bw,scale,isMale);
  else drawBack(hr,tc,bc,sc,bw,scale,isMale);

  ctx.restore();
}

function drawFront(sk,hr,ey,lp,tc,bc,sc,bw,scale,isMale){
  const W=bw, H=300*scale;
  const cx=0;

  // 신발
  if(av.shoes!=='barefoot'){
    ctx.fillStyle=sc;
    ctx.beginPath();ctx.ellipse(cx-14,H+5,16,8,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+14,H+5,16,8,0,0,Math.PI*2);ctx.fill();
    if(av.shoes==='heels'){
      ctx.fillStyle=sc;
      ctx.fillRect(cx-25,H-2,8,14);
      ctx.fillRect(cx+17,H-2,8,14);
    }
    if(av.shoes==='boots'){
      ctx.fillRect(cx-26,H-15,18,20);
      ctx.fillRect(cx+8,H-15,18,20);
    }
  }

  // 아래옷
  const legH=H*0.38;
  const legTop=H*0.52;
  if(av.bottom!=='none'&&av.bottom!=='skirt'&&av.bottom!=='miniskirt'){
    ctx.fillStyle=bc;
    // 왼쪽 다리
    ctx.beginPath();
    ctx.roundRect(cx-W/2+2,legTop,W/2-3,legH,6);ctx.fill();
    // 오른쪽 다리
    ctx.beginPath();
    ctx.roundRect(cx+3,legTop,W/2-3,legH,6);ctx.fill();
    // 허리 부분
    ctx.fillRect(cx-W/2+2,legTop-10,W-4,16);
    // 청바지면 솔기선
    if(av.bottom==='jeans'){
      ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(cx,legTop);ctx.lineTo(cx,legTop+legH);ctx.stroke();
    }
  } else if(av.bottom==='skirt'||av.bottom==='miniskirt'){
    const skL=av.bottom==='miniskirt'?60:90;
    ctx.fillStyle=bc;
    ctx.beginPath();
    ctx.moveTo(cx-W/2+2,legTop-10);
    ctx.lineTo(cx+W/2-2,legTop-10);
    ctx.lineTo(cx+W/2+10,legTop+skL);
    ctx.lineTo(cx-W/2-10,legTop+skL);
    ctx.closePath();ctx.fill();
    // 치마 밑 다리
    ctx.fillStyle=sk;
    ctx.beginPath();ctx.roundRect(cx-18,legTop+skL,14,H-legTop-skL,4);ctx.fill();
    ctx.beginPath();ctx.roundRect(cx+4,legTop+skL,14,H-legTop-skL,4);ctx.fill();
  }

  // 윗옷
  const torsoH=H*0.35;
  const torsoTop=H*0.18;
  ctx.fillStyle=tc;
  if(av.top==='dress'){
    ctx.beginPath();
    ctx.moveTo(cx-W/2+2,torsoTop);
    ctx.lineTo(cx+W/2-2,torsoTop);
    ctx.lineTo(cx+W/2+15,H+5);
    ctx.lineTo(cx-W/2-15,H+5);
    ctx.closePath();ctx.fill();
  } else {
    ctx.beginPath();ctx.roundRect(cx-W/2,torsoTop,W,torsoH,8);ctx.fill();
    // 후디 주머니
    if(av.top==='hoodie'){
      ctx.fillStyle='rgba(0,0,0,.15)';
      ctx.beginPath();ctx.roundRect(cx-18,torsoTop+torsoH*0.5,36,28,6);ctx.fill();
    }
    // 정장 라펠
    if(av.top==='suit'){
      ctx.fillStyle='rgba(255,255,255,.15)';
      ctx.beginPath();ctx.moveTo(cx-4,torsoTop);ctx.lineTo(cx-18,torsoTop+30);ctx.lineTo(cx-4,torsoTop+50);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(cx+4,torsoTop);ctx.lineTo(cx+18,torsoTop+30);ctx.lineTo(cx+4,torsoTop+50);ctx.closePath();ctx.fill();
      ctx.fillStyle='#e74c3c';
      ctx.beginPath();ctx.arc(cx,torsoTop+20,4,0,Math.PI*2);ctx.fill();
    }
    // 스트라이프
    if(av.top==='stripe'){
      ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=4;
      for(let i=-W/2+8;i<W/2;i+=12){
        ctx.beginPath();ctx.moveTo(cx+i,torsoTop);ctx.lineTo(cx+i,torsoTop+torsoH);ctx.stroke();
      }
    }
    // 팔
    ctx.fillStyle=tc;
    if(av.top!=='tanktop'&&av.top!=='crop'){
      const slvL=av.top==='tshirt'?40:av.top==='longsleeve'||av.top==='hoodie'||av.top==='jacket'||av.top==='suit'?torsoH:30;
      ctx.beginPath();ctx.roundRect(cx-W/2-18,torsoTop+8,18,slvL,8);ctx.fill();
      ctx.beginPath();ctx.roundRect(cx+W/2,torsoTop+8,18,slvL,8);ctx.fill();
    }
  }

  // 목
  ctx.fillStyle=sk;
  ctx.beginPath();ctx.roundRect(cx-10,H*0.13,20,H*0.07,4);ctx.fill();

  // 머리
  const headW=isMale?52:48, headH=isMale?58:62;
  const headTop=H*0.02;
  const headCY=headTop+headH/2;

  // 얼굴형
  ctx.fillStyle=sk;
  if(av.faceShape==='round'){
    ctx.beginPath();ctx.ellipse(cx,headCY,headW/2,headH/2,0,0,Math.PI*2);ctx.fill();
  } else if(av.faceShape==='square'){
    ctx.beginPath();ctx.roundRect(cx-headW/2,headTop,headW,headH,8);ctx.fill();
  } else if(av.faceShape==='heart'){
    ctx.beginPath();ctx.moveTo(cx,headTop+headH);ctx.bezierCurveTo(cx-headW/2,headCY+10,cx-headW/2-5,headCY-10,cx-5,headTop+15);ctx.bezierCurveTo(cx-5,headTop+8,cx,headTop+4,cx,headTop+10);ctx.bezierCurveTo(cx,headTop+4,cx+5,headTop+8,cx+5,headTop+15);ctx.bezierCurveTo(cx+headW/2+5,headCY-10,cx+headW/2,headCY+10,cx,headTop+headH);ctx.fill();
  } else if(av.faceShape==='long'){
    ctx.beginPath();ctx.ellipse(cx,headCY,headW/2*0.85,headH/2*1.2,0,0,Math.PI*2);ctx.fill();
  } else {
    ctx.beginPath();ctx.ellipse(cx,headCY,headW/2,headH/2,0,0,Math.PI*2);ctx.fill();
  }

  // 귀
  ctx.fillStyle=sk;
  ctx.beginPath();ctx.ellipse(cx-headW/2-4,headCY+4,6,9,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+headW/2+4,headCY+4,6,9,0,0,Math.PI*2);ctx.fill();

  // 귀걸이
  if(av.earring!=='none'){
    ctx.fillStyle=av.earring==='hoop'?'transparent':'#FFD700';
    ctx.strokeStyle='#FFD700';ctx.lineWidth=2;
    if(av.earring==='hoop'){
      ctx.beginPath();ctx.arc(cx-headW/2-4,headCY+14,6,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(cx+headW/2+4,headCY+14,6,0,Math.PI*2);ctx.stroke();
    } else if(av.earring==='stud'){
      ctx.fillStyle='#FFD700';
      ctx.beginPath();ctx.arc(cx-headW/2-5,headCY+4,4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx+headW/2+5,headCY+4,4,0,Math.PI*2);ctx.fill();
    } else {
      ctx.strokeStyle='#FFD700';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(cx-headW/2-5,headCY+4);ctx.lineTo(cx-headW/2-5,headCY+18);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+headW/2+5,headCY+4);ctx.lineTo(cx+headW/2+5,headCY+18);ctx.stroke();
      ctx.fillStyle='#FFD700';
      ctx.beginPath();ctx.arc(cx-headW/2-5,headCY+18,4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx+headW/2+5,headCY+18,4,0,Math.PI*2);ctx.fill();
    }
  }

  // 머리카락 (뒤)
  ctx.fillStyle=hr;
  if(av.hair==='long'||av.hair==='wavy'||av.hair==='curly'){
    ctx.beginPath();ctx.roundRect(cx-headW/2-4,headTop+20,headW+8,headH+80,4);ctx.fill();
  } else if(av.hair==='ponytail'){
    ctx.beginPath();ctx.roundRect(cx+headW/2-8,headTop+20,14,headH+50,4);ctx.fill();
  }

  // 머리카락 (앞)
  ctx.fillStyle=hr;
  if(av.hair==='buzzcut'){
    ctx.beginPath();ctx.ellipse(cx,headTop+10,headW/2,12,0,0,Math.PI*2);ctx.fill();
  } else if(av.hair==='updo'||av.hair==='bun'){
    ctx.beginPath();ctx.ellipse(cx,headTop-8,20,18,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.roundRect(cx-headW/2,headTop,headW,25,6);ctx.fill();
  } else if(av.hair==='afro'){
    ctx.beginPath();ctx.ellipse(cx,headCY-10,headW/2+18,headH/2+20,0,0,Math.PI*2);ctx.fill();
  } else {
    ctx.beginPath();ctx.ellipse(cx,headTop+8,headW/2+2,18,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.roundRect(cx-headW/2-2,headTop,headW+4,32,{tl:headW/2,tr:headW/2,bl:0,br:0});ctx.fill();
    if(av.hair==='medium'||av.hair==='wavy'||av.hair==='curly'){
      ctx.beginPath();ctx.roundRect(cx-headW/2-2,headTop+10,14,35,6);ctx.fill();
      ctx.beginPath();ctx.roundRect(cx+headW/2-12,headTop+10,14,35,6);ctx.fill();
    }
  }

  // 눈썹
  const browY=headCY-10;
  ctx.strokeStyle=hr==='#ffffff'?'#cccccc':hr;
  const browW={natural:16,thick:18,thin:12,arched:16,straight:18,angry:16}[av.brow]||16;
  const browLW={natural:2,thick:3.5,thin:1.5,arched:2,straight:3,angry:3}[av.brow]||2;
  ctx.lineWidth=browLW;ctx.lineCap='round';
  if(av.brow==='arched'){
    ctx.beginPath();ctx.moveTo(cx-22,browY+2);ctx.quadraticCurveTo(cx-14,browY-6,cx-6,browY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+6,browY);ctx.quadraticCurveTo(cx+14,browY-6,cx+22,browY+2);ctx.stroke();
  } else if(av.brow==='angry'){
    ctx.beginPath();ctx.moveTo(cx-22,browY-2);ctx.lineTo(cx-6,browY+4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+6,browY+4);ctx.lineTo(cx+22,browY-2);ctx.stroke();
  } else if(av.brow==='straight'){
    ctx.beginPath();ctx.moveTo(cx-22,browY);ctx.lineTo(cx-4,browY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+4,browY);ctx.lineTo(cx+22,browY);ctx.stroke();
  } else {
    ctx.beginPath();ctx.moveTo(cx-22,browY+2);ctx.quadraticCurveTo(cx-14,browY-2,cx-6,browY+1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+6,browY+1);ctx.quadraticCurveTo(cx+14,browY-2,cx+22,browY+2);ctx.stroke();
  }

  // 눈
  const eyeY=headCY+2;
  const eyeRX={round:9,almond:11,narrow:12,droopy:10,wide:10,monolid:11}[av.eye]||9;
  const eyeRY={round:9,almond:7,narrow:5,droopy:8,wide:10,monolid:5}[av.eye]||9;
  // 흰자
  ctx.fillStyle='white';
  ctx.beginPath();ctx.ellipse(cx-16,eyeY,eyeRX,eyeRY,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+16,eyeY,eyeRX,eyeRY,0,0,Math.PI*2);ctx.fill();
  // 처진눈
  if(av.eye==='droopy'){
    ctx.fillStyle=sk;
    ctx.beginPath();ctx.moveTo(cx-16-eyeRX,eyeY);ctx.lineTo(cx-16+eyeRX,eyeY);ctx.lineTo(cx-16+eyeRX,eyeY-3);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+16-eyeRX,eyeY);ctx.lineTo(cx+16+eyeRX,eyeY);ctx.lineTo(cx+16-eyeRX,eyeY-3);ctx.closePath();ctx.fill();
  }
  // 눈동자
  ctx.fillStyle=ey;
  ctx.beginPath();ctx.ellipse(cx-15,eyeY,eyeRX*0.55,eyeRY*0.75,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+17,eyeY,eyeRX*0.55,eyeRY*0.75,0,0,Math.PI*2);ctx.fill();
  // 하이라이트
  ctx.fillStyle='white';
  ctx.beginPath();ctx.arc(cx-14,eyeY-2,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+18,eyeY-2,2.5,0,Math.PI*2);ctx.fill();
  // 속눈썹
  if(av.lash!=='none'){
    ctx.strokeStyle='#1a1a1a';
    ctx.lineWidth=av.lash==='dramatic'?2:1.2;
    const lc=av.lash==='dramatic'?5:3;
    for(let i=0;i<lc;i++){
      const x1=cx-16-eyeRX+i*(eyeRX*2/lc);
      ctx.beginPath();ctx.moveTo(x1,eyeY-eyeRY);ctx.lineTo(x1-2,eyeY-eyeRY-5);ctx.stroke();
    }
    for(let i=0;i<lc;i++){
      const x1=cx+16-eyeRX+i*(eyeRX*2/lc);
      ctx.beginPath();ctx.moveTo(x1,eyeY-eyeRY);ctx.lineTo(x1-2,eyeY-eyeRY-5);ctx.stroke();
    }
  }

  // 코
  const noseY=headCY+14;
  ctx.strokeStyle=sk==='#FFDBB4'?'#c8a080':darken(sk,0.85);
  ctx.lineWidth=1.5;ctx.lineCap='round';
  if(av.nose==='small'){
    ctx.beginPath();ctx.moveTo(cx-5,noseY);ctx.lineTo(cx,noseY+6);ctx.lineTo(cx+5,noseY);ctx.stroke();
  } else if(av.nose==='button'){
    ctx.beginPath();ctx.arc(cx,noseY+4,4,0,Math.PI*2);ctx.stroke();
  } else if(av.nose==='broad'){
    ctx.beginPath();ctx.moveTo(cx-9,noseY);ctx.quadraticCurveTo(cx-9,noseY+8,cx-4,noseY+8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+9,noseY);ctx.quadraticCurveTo(cx+9,noseY+8,cx+4,noseY+8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-4,noseY+8);ctx.lineTo(cx+4,noseY+8);ctx.stroke();
  } else if(av.nose==='roman'){
    ctx.beginPath();ctx.moveTo(cx,noseY-4);ctx.lineTo(cx+2,noseY+3);ctx.lineTo(cx-1,noseY+8);ctx.stroke();
  } else {
    ctx.beginPath();ctx.moveTo(cx-4,noseY);ctx.lineTo(cx,noseY+5);ctx.lineTo(cx+4,noseY);ctx.stroke();
  }

  // 볼 터치
  if(av.blush!=='none'){
    if(av.blush==='freckles'){
      ctx.fillStyle='rgba(180,100,80,.3)';
      for(let i=0;i<8;i++){
        ctx.beginPath();ctx.arc(cx-20+Math.random()*14,headCY+10+Math.random()*10,2,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(cx+6+Math.random()*14,headCY+10+Math.random()*10,2,0,Math.PI*2);ctx.fill();
      }
    } else {
      const ba=av.blush==='rosy'?0.3:0.15;
      ctx.fillStyle=`rgba(255,120,100,${ba})`;
      ctx.beginPath();ctx.ellipse(cx-22,headCY+14,12,8,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx+22,headCY+14,12,8,0,0,Math.PI*2);ctx.fill();
    }
  }

  // 입술
  const lipY=headCY+24;
  ctx.fillStyle=lp;
  ctx.strokeStyle=darken(lp,0.8);ctx.lineWidth=1;
  if(av.lips==='smile'){
    ctx.beginPath();ctx.moveTo(cx-10,lipY);ctx.quadraticCurveTo(cx,lipY+8,cx+10,lipY);ctx.strokeStyle=darken(lp,0.8);ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();
    ctx.beginPath();ctx.arc(cx-10,lipY,2,0,Math.PI*2);ctx.fillStyle=darken(lp,0.8);ctx.fill();
    ctx.beginPath();ctx.arc(cx+10,lipY,2,0,Math.PI*2);ctx.fill();
  } else if(av.lips==='grin'){
    ctx.fillStyle=lp;
    ctx.beginPath();ctx.moveTo(cx-12,lipY);ctx.quadraticCurveTo(cx,lipY+12,cx+12,lipY);ctx.quadraticCurveTo(cx,lipY+6,cx-12,lipY);ctx.fill();
    ctx.fillStyle='white';
    ctx.beginPath();ctx.roundRect(cx-9,lipY+1,18,7,2);ctx.fill();
  } else if(av.lips==='neutral'){
    ctx.strokeStyle=lp;ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(cx-10,lipY+3);ctx.lineTo(cx+10,lipY+3);ctx.stroke();
  } else if(av.lips==='pout'){
    ctx.beginPath();ctx.moveTo(cx-10,lipY+4);ctx.quadraticCurveTo(cx,lipY-2,cx+10,lipY+4);ctx.strokeStyle=lp;ctx.lineWidth=3;ctx.lineCap='round';ctx.stroke();
  } else if(av.lips==='open'){
    ctx.fillStyle=lp;
    ctx.beginPath();ctx.ellipse(cx,lipY+4,10,7,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a0008';
    ctx.beginPath();ctx.ellipse(cx,lipY+5,7,4,0,0,Math.PI*2);ctx.fill();
  } else if(av.lips==='smirk'){
    ctx.strokeStyle=lp;ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(cx-8,lipY+2);ctx.quadraticCurveTo(cx+2,lipY+2,cx+10,lipY-2);ctx.stroke();
  }

  // 콧수염
  if(av.mustache!=='none'){
    ctx.fillStyle=hr==='#ffffff'?'#aaaaaa':darken(hr,0.7);
    if(av.mustache==='thin'){
      ctx.beginPath();ctx.ellipse(cx,noseY+10,14,3,0,0,Math.PI*2);ctx.fill();
    } else if(av.mustache==='full'){
      ctx.beginPath();ctx.moveTo(cx-14,noseY+9);ctx.quadraticCurveTo(cx,noseY+14,cx+14,noseY+9);ctx.quadraticCurveTo(cx,noseY+18,cx-14,noseY+9);ctx.fill();
    } else if(av.mustache==='beard'){
      ctx.beginPath();ctx.ellipse(cx,lipY+14,14,10,0,0,Math.PI*2);ctx.fill();
    } else if(av.mustache==='full-beard'){
      ctx.beginPath();ctx.moveTo(cx-14,noseY+9);ctx.quadraticCurveTo(cx,noseY+14,cx+14,noseY+9);ctx.quadraticCurveTo(cx,noseY+18,cx-14,noseY+9);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx,lipY+12,16,12,0,0,Math.PI*2);ctx.fill();
    }
  }

  // 안경
  if(av.glasses!=='none'){
    ctx.strokeStyle=av.glasses==='sunglasses'?'#1a1a1a':'#444';
    ctx.lineWidth=2;
    if(av.glasses==='sunglasses'){
      ctx.fillStyle='rgba(0,0,0,.7)';
      ctx.beginPath();ctx.ellipse(cx-16,eyeY,13,9,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx+16,eyeY,13,9,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#1a1a1a';
      ctx.beginPath();ctx.moveTo(cx-3,eyeY);ctx.lineTo(cx+3,eyeY);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx-29,eyeY-2);ctx.lineTo(cx-36,eyeY);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+29,eyeY-2);ctx.lineTo(cx+36,eyeY);ctx.stroke();
    } else {
      const gr=av.glasses==='round'?10:av.glasses==='cat-eye'?10:11;
      ctx.strokeStyle='#555';
      ctx.beginPath();ctx.ellipse(cx-16,eyeY,gr,av.glasses==='round'?10:8,av.glasses==='cat-eye'?-0.2:0,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.ellipse(cx+16,eyeY,gr,av.glasses==='round'?10:8,av.glasses==='cat-eye'?0.2:0,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx-16+gr,eyeY);ctx.lineTo(cx+16-gr,eyeY);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx-16-gr,eyeY-2);ctx.lineTo(cx-38,eyeY);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+16+gr,eyeY-2);ctx.lineTo(cx+38,eyeY);ctx.stroke();
    }
  }

  // 모자
  if(av.hat!=='none'){
    ctx.fillStyle=hr==='#FFD700'?'#8B4513':hr;
    if(av.hat==='cap'){
      ctx.fillStyle='#e85d3a';
      ctx.beginPath();ctx.ellipse(cx,headTop+8,headW/2+4,16,0,Math.PI,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx+10,headTop+24,20,6,0.3,0,Math.PI*2);ctx.fill();
    } else if(av.hat==='beanie'){
      ctx.fillStyle=tc;
      ctx.beginPath();ctx.ellipse(cx,headTop+5,headW/2+2,22,0,Math.PI,Math.PI*2);ctx.fill();
      ctx.fillRect(cx-headW/2-2,headTop+18,headW+4,10);
    } else if(av.hat==='beret'){
      ctx.fillStyle='#2c3e50';
      ctx.beginPath();ctx.ellipse(cx+8,headTop-2,headW/2+6,14,0.2,0,Math.PI*2);ctx.fill();
    } else if(av.hat==='bucket'){
      ctx.fillStyle='#e8c89a';
      ctx.beginPath();ctx.ellipse(cx,headTop+4,headW/2+4,12,0,0,Math.PI*2);ctx.fill();
      ctx.fillRect(cx-headW/2-8,headTop+12,headW+16,8);
    } else if(av.hat==='cowboy'){
      ctx.fillStyle='#8B4513';
      ctx.beginPath();ctx.ellipse(cx,headTop+4,headW/2+2,16,0,Math.PI,Math.PI*2);ctx.fill();
      ctx.fillRect(cx-headW/2-14,headTop+14,headW+28,6);
    }
  }

  // 목걸이
  if(av.necklace!=='none'){
    const ny=H*0.19+10;
    ctx.strokeStyle='#FFD700';ctx.lineWidth=av.necklace==='chain'?1.5:2;
    ctx.beginPath();ctx.arc(cx,ny,16,0.2,Math.PI-0.2);ctx.stroke();
    if(av.necklace==='pendant'){
      ctx.fillStyle='#FFD700';
      ctx.beginPath();ctx.arc(cx,ny+16,5,0,Math.PI*2);ctx.fill();
    } else if(av.necklace==='choker'){
      ctx.lineWidth=5;ctx.strokeStyle='#1a1a1a';
      ctx.beginPath();ctx.arc(cx,ny-4,14,0.2,Math.PI-0.2);ctx.stroke();
    }
  }

  // 가방
  if(av.bag!=='none'&&av.bag!=='none'){
    const baY=H*0.42;
    ctx.fillStyle='#8B4513';
    if(av.bag==='backpack'){
      ctx.fillStyle='#e85d3a';
      ctx.beginPath();ctx.roundRect(cx+bw/2+4,H*0.2,30,45,6);ctx.fill();
      ctx.strokeStyle='#c0391a';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(cx+bw/2+6,H*0.2);ctx.lineTo(cx+bw/2+6,H*0.2+45);ctx.stroke();
    } else if(av.bag==='tote'){
      ctx.fillStyle='#e8c89a';
      ctx.beginPath();ctx.roundRect(cx+bw/2+2,baY,36,40,4);ctx.fill();
      ctx.strokeStyle='#8B4513';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(cx+bw/2+8,baY);ctx.quadraticCurveTo(cx+bw/2+18,baY-15,cx+bw/2+28,baY);ctx.stroke();
    } else if(av.bag==='crossbody'){
      ctx.fillStyle='#8B4513';
      ctx.beginPath();ctx.roundRect(cx+bw/2+2,baY+10,28,32,4);ctx.fill();
      ctx.strokeStyle='#6B3D2E';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(cx,H*0.22);ctx.lineTo(cx+bw/2+14,baY+10);ctx.stroke();
    } else if(av.bag==='clutch'){
      ctx.fillStyle='#d4537e';
      ctx.beginPath();ctx.roundRect(cx+bw/2+2,baY+20,36,22,4);ctx.fill();
    }
  }
}

function drawSide(sk,hr,tc,bc,sc,bw,scale,isMale){
  const H=300*scale, cx=0;
  ctx.fillStyle=sc;
  ctx.beginPath();ctx.ellipse(cx+10,H+5,18,7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=bc;ctx.beginPath();ctx.roundRect(cx-8,H*0.52,22,H*0.38,6);ctx.fill();
  ctx.fillStyle=tc;ctx.beginPath();ctx.roundRect(cx-bw*0.3,H*0.18,bw*0.6,H*0.35,8);ctx.fill();
  ctx.fillStyle=sk;ctx.beginPath();ctx.roundRect(cx-6,H*0.13,14,H*0.07,4);ctx.fill();
  ctx.fillStyle=sk;ctx.beginPath();ctx.ellipse(cx,H*0.02+30,26,32,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=hr;ctx.beginPath();ctx.ellipse(cx+6,H*0.02+14,22,20,0.2,Math.PI,Math.PI*2);ctx.fill();
}

function drawBack(hr,tc,bc,sc,bw,scale,isMale){
  const H=300*scale, cx=0;
  ctx.fillStyle=sc;
  ctx.beginPath();ctx.ellipse(cx-14,H+5,16,8,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+14,H+5,16,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=bc;
  ctx.beginPath();ctx.roundRect(cx-bw/2+2,H*0.52,bw/2-3,H*0.38,6);ctx.fill();
  ctx.beginPath();ctx.roundRect(cx+3,H*0.52,bw/2-3,H*0.38,6);ctx.fill();
  ctx.fillRect(cx-bw/2+2,H*0.52-10,bw-4,16);
  ctx.fillStyle=tc;ctx.beginPath();ctx.roundRect(cx-bw/2,H*0.18,bw,H*0.35,8);ctx.fill();
  ctx.beginPath();ctx.roundRect(cx-bw/2-18,H*0.18+8,18,H*0.25,8);ctx.fill();
  ctx.beginPath();ctx.roundRect(cx+bw/2,H*0.18+8,18,H*0.25,8);ctx.fill();
  // 뒷머리
  ctx.fillStyle=hr;
  const hw=26;
  ctx.beginPath();ctx.ellipse(cx,H*0.02+28,hw,32,0,0,Math.PI*2);ctx.fill();
  if(av.hair==='long'||av.hair==='wavy'||av.hair==='ponytail'){
    ctx.beginPath();ctx.roundRect(cx-18,H*0.02+50,36,70,8);ctx.fill();
  }
  if(av.hat==='cap'){
    ctx.fillStyle='#e85d3a';
    ctx.beginPath();ctx.arc(cx,H*0.02+28,hw+4,Math.PI,Math.PI*2);ctx.fill();
  }
}

function darken(hex,factor){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgb(${Math.floor(r*factor)},${Math.floor(g*factor)},${Math.floor(b*factor)})`;
}

function saveAndBack(){
  try{localStorage.setItem('catchup_avatar2',JSON.stringify(av));}catch(e){}
  window.location.href='index.html';
}

initUI();
drawAvatar();
</script>
